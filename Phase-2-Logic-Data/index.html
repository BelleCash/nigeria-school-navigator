<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>School Navigator | Phase 2</title>

  <link rel="stylesheet" href="style.css"/>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- ========================= -->
  <!-- SCRIPTS (FIXED ORDER) -->
  <!-- ========================= -->

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>

  <!-- Your app -->
  <script src="src/script.js" defer></script>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">
      <img 
        src="assets/images/inamatrix-logo.png" 
        alt="Inamatrix Logo"
        onerror="this.style.display='none'"
      />
      <span>School Navigator</span>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-content">

      <h1>Find the Best Schools in Nigeria</h1>
      <p>Search, filter and explore schools across all states.</p>

      <!-- SEARCH FORM -->
      <form id="searchForm" class="search-container">

        <input
          type="text"
          id="searchInput"
          placeholder="Search school name..."
        />

        <!-- STATE FILTER -->
        <select id="stateFilter">
          <option value="">All States</option>
          <option value="Abuja">FCT (Abuja)</option>
          <option value="Lagos">Lagos</option>
          <option value="Kano">Kano</option>
          <option value="Rivers">Rivers</option>
          <option value="Oyo">Oyo</option>
          <option value="Delta">Delta</option>
          <option value="Edo">Edo</option>
        </select>

        <!-- TYPE FILTER -->
        <select id="typeFilter">
          <option value="">All Types</option>
          <option value="primary">Primary</option>
          <option value="secondary">Secondary</option>
          <option value="tertiary">Tertiary</option>
        </select>

        <button type="submit">Search</button>

      </form>

    </div>
  </section>

  <!-- RESULTS -->
  <main class="results-section">

    <div class="results-header">
      <h2>Results</h2>
      <span id="resultCount"></span>
    </div>

    <div id="resultsGrid" class="school-grid"></div>

    <p id="emptyState" class="empty-state hidden">
      No schools found. Try adjusting your filters.
    </p>

  </main>

</body>
</html>
