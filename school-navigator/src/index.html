<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>School Navigator | Nigeria</title>

  <link rel="stylesheet" href="style.css"/>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">
      <span>🏫 School Navigator</span>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-content">

      <h1>Find Schools Across Nigeria</h1>
      <p>Search 100,000+ schools instantly with smart filters</p>

      <!-- SEARCH FORM -->
      <form id="searchForm" class="search-container">

        <input type="text" id="searchInput" placeholder="Search school name..." />

        <select id="stateFilter">
          <option value="">All States</option>
        </select>

        <select id="lgaFilter">
          <option value="">All LGAs</option>
        </select>

        <select id="typeFilter">
          <option value="">All Levels</option>
          <option value="primary">Primary</option>
          <option value="secondary">Secondary</option>
          <option value="tertiary">Tertiary</option>
        </select>

        <select id="settlementFilter">
          <option value="">Urban / Rural</option>
          <option value="urban">Urban</option>
          <option value="rural">Rural</option>
        </select>

        <button type="submit">Search</button>

      </form>

    </div>
  </section>

  <!-- RESULTS -->
  <main class="results-section">

    <div class="results-header">
      <h2>Results</h2>
      <span id="resultCount">0</span>
    </div>

    <div id="resultsGrid" class="school-grid"></div>

    <p id="emptyState" class="empty-state hidden">
      No schools found. Try adjusting filters.
    </p>

  </main>

  <!-- APP LOGIC -->
  <script src="script.js"></script>

</body>
</html>
